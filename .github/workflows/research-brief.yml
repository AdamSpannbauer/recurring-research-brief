name: Research Brief

on:
  workflow_dispatch:
    inputs:
      send_discord:
        description: "Post Discord highlights"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Generate brief without Discord
        if: ${{ !inputs.send_discord }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/research_brief.py --no-discord

      - name: Generate brief with Discord
        if: ${{ inputs.send_discord }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python3 scripts/research_brief.py

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add briefs runs history/items.jsonl
          if git diff --cached --quiet; then
            echo "No generated artifact changes to commit."
            exit 0
          fi
          git commit -m "generate research brief"
          git push
